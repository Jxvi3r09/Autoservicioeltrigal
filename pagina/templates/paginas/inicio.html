{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--Archivos staticos conexion css-->
    <link href="{% static 'myapp/css/iniciarsesion.css.' %}" rel="stylesheet" />
    <!--Conexion fuente inter-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!--Iconos de font awesome-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Iniciar Sección</title>
  </head>
  <body>
    <!--Mensaje de registro exitoso-->
    {% if messages %} {% for message in messages %}
    <div id="mensaje-alerta" class="alert alert-success" role="alert">
      {{ message }}
    </div>
    {% endfor %} {% endif %}

    <script>
      // Desaparece el mensaje después de 5 segundos (5000 milisegundos)
      setTimeout(function () {
        var mensaje = document.getElementById("mensaje-alerta");
        if (mensaje) {
          mensaje.style.transition = "opacity 0.5s ease"; // Agregar una animación
          mensaje.style.opacity = "0";
          setTimeout(() => (mensaje.style.display = "none"), 500); // Después de la animación, ocultarlo
        }
      }, 5000);
    </script>

    <!--Boton de regresar a inicio-->
    <div class="atras">
      <a href="{% url 'index' %}" class="btn-index">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
    </div>

    <div class="contenedor">
      <a href="{% url 'index' %}">
        <img
          src="{% static 'myapp/imagenes/logo.jpeg' %}"
          alt="Logo de la empresa"
          width="200"
          title="Logo Autoservicio El Trigal"
        />
      </a>
    </div>

    <form action="#" method="POST">
      {% csrf_token %}
      <h4>
        <span class="linea1">Bienvenido de nuevo</span>
        <span class="linea2">Inicia sesión para continuar</span>
        <span class="linea3">donde lo dejaste</span>
      </h4>

      <ul>
        <li>
          <div class="user-logo">
            <i class="fa-regular fa-user"></i>
            <input
              type="text"
              id="usuario"
              name="username"
              placeholder="Ingresa tu usuario"
              required
            />
          </div>
        </li>
        <li>
          <div class="password-logo">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              id="contraseña"
              name="password"
              placeholder="Ingresa tu contraseña"
              required
            />
          </div>
        </li>
      </ul>
      <li class="button">
        <button type="submit">Iniciar sesión</button>
      </li>
      <hr />
      <p class="olvide">
        <a href="/recuperar-contraseña">¿Has olvidado tu contraseña?</a>
      </p>
      <a href="{% url 'registrate' %}" class="btn-Registrate">Registrarse</a>
    </form>
  </body>
</html>
