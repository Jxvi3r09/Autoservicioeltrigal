{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="{% static 'myapp/css/registrarse.css.' %}" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Regístrate</title>
  </head>
  <body>
    <div class="contenedor">
      <a href="{% url 'index' %}">
        <img
          src="{% static 'myapp/imagenes/logo.jpeg' %}"
          alt="Logo de la empresa"
          width="200"
          title="Logo Autoservicio El Trigal"
        />
      </a>
    </div>
    <form action="#" method="POST">
      {% csrf_token %}
      <!--Evita errores en el registro-->
      <h2>Crear cuenta</h2>
      <!--Texto de cordialidad-->
      <h5>
        <span class="linea1"
          >¡Es muy fácil! Solo tienes que registrarte y en un par de pasos</span
        >
        <span class="linea2">
          estarás listo para aprovechar todos los beneficios que tenemos para
          ti.</span
        >
      </h5>
      <hr />
      <input type="text" id="nombre" placeholder="Nombres" required />

      <input type="text" id="apellido" placeholder="Apellidos" required />

      <input type=number" name="id" id="numero_id" placeholder="Introduzca su
      Id" required>

      <label for="rol">Selecciona tu rol:</label>
      <select id="rol" name="rol" required>
        <option value="administrador">Administrador</option>
        <option value="empleado">Empleado</option>
      </select>

      <input
        type="text"
        name="correo"
        id="correo"
        placeholder="Ingrese su correo o número de telefono"
        required
      />

      <input
        type="password"
        name="contraseña"
        id="contraseña"
        placeholder="Ingrese una contraseña segura"
        required
        minlength="8"
        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}"
        title="La contraseña debe tener al menos 8 caracteres, incluir una letra, un numero y un caracter especial"
      />

      <li class="button">
        <button type="submit">Registrarse</button>
      </li>
    </form>
  </body>
</html>
